<!DOCTYPE html>
<html>
<head>
  <title>Offline Mode - Flappy Bird</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f0f0f0;
      text-align: center;
    }

    .container {
      max-width: 500px;
      margin: auto;
      padding: 20px;
    }

    .info {
      background: white;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 15px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    canvas {
      border-radius: 10px;
      border: 2px solid #777;
    }
  </style>
</head>
<body>

<div class="container">

  <h1>🛜 You are offline</h1>

  <div class="info">
    <h3>🎮 Cara Bermain</h3>
    <p>Tekan <b>SPASI</b> atau <b>SENTUH LAYAR</b> untuk terbang</p>
    <p>Tabrak = game over</p>
  </div>

  <canvas id="game" width="500" height="600"></canvas>

</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let bird = {
  x: 80,
  y: 200,
  size: 20,
  velocity: 0
};

let gravity = 0.5;
let pipes = [];
let score = 0;
let gameOver = false;
let speed = 2; // 🔥 kecepatan awal

// Awan bergerak
let clouds = [];
for (let i = 0; i < 5; i++) {
  clouds.push({
    x: Math.random() * canvas.width,
    y: Math.random() * 150 + 20,
    width: Math.random() * 60 + 40,
    speed: Math.random() * 0.3 + 0.2
  });
}

// Gerombolan burung terbang
let flyingBirds = [];
for (let i = 0; i < 8; i++) {
  flyingBirds.push({
    x: Math.random() * canvas.width + canvas.width,
    y: Math.random() * 120 + 40,
    speed: Math.random() * 1 + 0.8,
    wingUp: Math.random() > 0.5
  });
}

// Ikan paus
let whale = {
  x: 50,
  y: canvas.height * 0.8,
  direction: 1,
  spoutTimer: 0,
  spouting: false
};

// Ombak laut
let waves = [];
for (let i = 0; i < 10; i++) {
  waves.push({
    x: i * 60,
    offset: Math.random() * Math.PI * 2
  });
}

// Gunung/bukit bergerak
let mountains = [];

// Pohon kelapa (diperbanyak)
let palmTrees = [];
for (let i = 0; i < 8; i++) {
  palmTrees.push({
    x: Math.random() * canvas.width + canvas.width + (i * 80),
    speed: 0.5
  });
}

// Orang berjemur
let beachPeople = [];
for (let i = 0; i < 4; i++) {
  beachPeople.push({
    x: Math.random() * canvas.width + canvas.width,
    type: Math.random() > 0.5 ? 'person' : 'umbrella',
    speed: 0.5
  });
}

// Pedagang kaki lima
let streetVendors = [];
for (let i = 0; i < 3; i++) {
  streetVendors.push({
    x: Math.random() * canvas.width + canvas.width + (i * 200),
    type: ['food', 'drink', 'coconut'][i % 3],
    speed: 0.5
  });
}

// Ruko/toko
let shops = [];
for (let i = 0; i < 4; i++) {
  shops.push({
    x: Math.random() * canvas.width + canvas.width + (i * 150),
    color: ['#FF6B6B', '#4ECDC4', '#FFE66D', '#95E1D3'][i % 4],
    speed: 0.5
  });
}

// Mobil di jalan
let cars = [];
for (let i = 0; i < 3; i++) {
  cars.push({
    x: Math.random() * canvas.width + canvas.width,
    color: ['#FF0000', '#0000FF', '#FFFF00'][i % 3],
    speed: Math.random() * 1 + 1.5
  });
}

// SpongeBob, Patrick, dan anak-anak bermain bola
let beachKids = {
  x: canvas.width + 100,
  speed: 0.5,
  ballY: 0,
  ballUp: true
};

// Animasi lava
let lavaOffset = 0;

function drawBackground() {
  // Langit biru
  let gradient = ctx.createLinearGradient(0, 0, 0, canvas.height * 0.6);
  gradient.addColorStop(0, "#87CEEB");
  gradient.addColorStop(1, "#B0E0E6");
  ctx.fillStyle = gradient;
  ctx.fillRect(0, 0, canvas.width, canvas.height * 0.6);
  
  // Awan bergerak
  ctx.fillStyle = "#FFFFFF";
  clouds.forEach(cloud => {
    // Awan terdiri dari beberapa lingkaran
    ctx.beginPath();
    ctx.arc(cloud.x, cloud.y, cloud.width * 0.3, 0, Math.PI * 2);
    ctx.arc(cloud.x + cloud.width * 0.3, cloud.y, cloud.width * 0.35, 0, Math.PI * 2);
    ctx.arc(cloud.x + cloud.width * 0.6, cloud.y, cloud.width * 0.3, 0, Math.PI * 2);
    ctx.fill();
    
    // Gerakkan awan ke kiri (parallax)
    cloud.x -= cloud.speed;
    if (cloud.x < -cloud.width) {
      cloud.x = canvas.width + cloud.width;
      cloud.y = Math.random() * 150 + 20;
    }
  });
  
  // Pantai (pasir)
  ctx.fillStyle = "#F4A460";
  ctx.fillRect(0, canvas.height * 0.6, canvas.width, canvas.height * 0.15);
  
  // Tekstur pasir
  ctx.fillStyle = "#DEB887";
  for (let i = 0; i < 30; i++) {
    let x = (i * 17) % canvas.width;
    let y = canvas.height * 0.6 + (i * 13) % (canvas.height * 0.15);
    ctx.fillRect(x, y, 2, 2);
  }
  
  // Laut biru
  let oceanGradient = ctx.createLinearGradient(0, canvas.height * 0.75, 0, canvas.height);
  oceanGradient.addColorStop(0, "#4682B4");
  oceanGradient.addColorStop(1, "#1E3A5F");
  ctx.fillStyle = oceanGradient;
  ctx.fillRect(0, canvas.height * 0.75, canvas.width, canvas.height * 0.25);
  
  // Ombak laut (animasi sine wave)
  ctx.fillStyle = "#5F9EA0";
  ctx.beginPath();
  ctx.moveTo(0, canvas.height * 0.75);
  for (let i = 0; i < canvas.width; i += 5) {
    let waveHeight = Math.sin((i + lavaOffset * 2) * 0.05) * 4;
    ctx.lineTo(i, canvas.height * 0.75 + waveHeight);
  }
  ctx.lineTo(canvas.width, canvas.height * 0.75);
  ctx.fill();
  
  // Ombak kedua (lebih dalam)
  ctx.fillStyle = "#87CEEB";
  ctx.beginPath();
  ctx.moveTo(0, canvas.height * 0.78);
  for (let i = 0; i < canvas.width; i += 5) {
    let waveHeight = Math.sin((i + lavaOffset * 3) * 0.04) * 3;
    ctx.lineTo(i, canvas.height * 0.78 + waveHeight);
  }
  ctx.lineTo(canvas.width, canvas.height * 0.78);
  ctx.fill();
  
  // Ikan paus
  drawWhale();
  
  // Gerombolan burung terbang
  drawFlyingBirds();
  
  // Gunung/bukit di belakang
  drawMountains();
  
  // Jalan aspal
  ctx.fillStyle = "#4A4A4A";
  ctx.fillRect(0, canvas.height * 0.55, canvas.width, canvas.height * 0.05);
  
  // Marka jalan (garis putih)
  ctx.fillStyle = "#FFFFFF";
  for (let i = 0; i < canvas.width; i += 30) {
    ctx.fillRect(i + (lavaOffset % 30), canvas.height * 0.573, 15, 2);
  }
  
  // Ruko/toko di pinggir jalan
  drawShops();
  
  // Mobil di jalan
  drawCars();
  
  // Pantai (pasir)
  ctx.fillStyle = "#F4A460";
  ctx.fillRect(0, canvas.height * 0.6, canvas.width, canvas.height * 0.15);
  
  // Tekstur pasir
  ctx.fillStyle = "#DEB887";
  for (let i = 0; i < 30; i++) {
    let x = (i * 17) % canvas.width;
    let y = canvas.height * 0.6 + (i * 13) % (canvas.height * 0.15);
    ctx.fillRect(x, y, 2, 2);
  }
  
  // Pohon kelapa
  drawPalmTrees();
  
  // Pedagang kaki lima
  drawStreetVendors();
  
  // Orang berjemur dan payung
  drawBeachPeople();
  
  // SpongeBob, Patrick, dan anak-anak bermain bola
  drawBeachKids();
}

function drawWhale() {
  // Update posisi paus
  whale.x += whale.direction * 0.3;
  if (whale.x > canvas.width - 50) whale.direction = -1;
  if (whale.x < 50) whale.direction = 1;
  
  // Badan paus (biru gelap)
  ctx.fillStyle = "#2C3E50";
  ctx.fillRect(whale.x, whale.y, 40, 15);
  
  // Kepala paus
  ctx.fillRect(whale.x + (whale.direction > 0 ? 35 : -10), whale.y + 3, 15, 10);
  
  // Ekor paus
  ctx.fillRect(whale.x + (whale.direction > 0 ? -8 : 38), whale.y + 5, 10, 8);
  ctx.fillRect(whale.x + (whale.direction > 0 ? -12 : 42), whale.y + 2, 6, 5);
  
  // Sirip
  ctx.fillStyle = "#34495E";
  ctx.fillRect(whale.x + 15, whale.y + 12, 8, 5);
  
  // Mata
  ctx.fillStyle = "#FFFFFF";
  ctx.fillRect(whale.x + (whale.direction > 0 ? 38 : 5), whale.y + 6, 2, 2);
  
  // Semburan air
  whale.spoutTimer++;
  if (whale.spoutTimer > 100) {
    whale.spouting = true;
  }
  if (whale.spoutTimer > 130) {
    whale.spouting = false;
    whale.spoutTimer = 0;
  }
  
  if (whale.spouting) {
    ctx.fillStyle = "#87CEEB";
    let spoutX = whale.x + 20;
    let spoutY = whale.y - 5;
    
    // Semburan air (3 kolom)
    for (let i = 0; i < 3; i++) {
      let height = 15 + Math.random() * 10;
      ctx.fillRect(spoutX + i * 3, spoutY - height, 2, height);
    }
    
    // Tetesan air
    ctx.fillStyle = "rgba(135, 206, 235, 0.6)";
    for (let i = 0; i < 5; i++) {
      let dropX = spoutX + Math.random() * 10 - 5;
      let dropY = spoutY - 20 - Math.random() * 10;
      ctx.fillRect(dropX, dropY, 2, 2);
    }
  }
}

function drawFlyingBirds() {
  ctx.fillStyle = "#000000";
  
  flyingBirds.forEach(b => {
    // Burung berbentuk V sederhana
    if (b.wingUp) {
      // Sayap atas
      ctx.fillRect(b.x - 3, b.y, 2, 1);
      ctx.fillRect(b.x - 2, b.y - 1, 2, 1);
      ctx.fillRect(b.x, b.y - 2, 2, 1);
      ctx.fillRect(b.x + 2, b.y - 1, 2, 1);
      ctx.fillRect(b.x + 4, b.y, 2, 1);
    } else {
      // Sayap bawah
      ctx.fillRect(b.x - 3, b.y, 2, 1);
      ctx.fillRect(b.x - 2, b.y + 1, 2, 1);
      ctx.fillRect(b.x, b.y + 2, 2, 1);
      ctx.fillRect(b.x + 2, b.y + 1, 2, 1);
      ctx.fillRect(b.x + 4, b.y, 2, 1);
    }
    
    // Gerakkan burung ke kiri
    b.x -= b.speed;
    
    // Animasi kepakan sayap
    if (Math.random() > 0.9) {
      b.wingUp = !b.wingUp;
    }
    
    // Reset posisi jika keluar layar
    if (b.x < -10) {
      b.x = canvas.width + 10;
      b.y = Math.random() * 120 + 40;
      b.speed = Math.random() * 1 + 0.8;
    }
  });
}

function drawMountains() {
  // Tambah gunung setiap 5 halangan (score kelipatan 5)
  if (score > 0 && score % 5 === 0 && mountains.length === 0) {
    mountains.push({
      x: canvas.width,
      height: Math.random() * 60 + 40
    });
  }
  
  ctx.fillStyle = "#8B7355";
  mountains.forEach((m, index) => {
    // Gunung/bukit
    ctx.beginPath();
    ctx.moveTo(m.x, canvas.height * 0.6);
    ctx.lineTo(m.x + 40, canvas.height * 0.6 - m.height);
    ctx.lineTo(m.x + 80, canvas.height * 0.6);
    ctx.fill();
    
    // Puncak gunung (lebih gelap)
    ctx.fillStyle = "#654321";
    ctx.beginPath();
    ctx.moveTo(m.x + 30, canvas.height * 0.6 - m.height * 0.6);
    ctx.lineTo(m.x + 40, canvas.height * 0.6 - m.height);
    ctx.lineTo(m.x + 50, canvas.height * 0.6 - m.height * 0.6);
    ctx.fill();
    ctx.fillStyle = "#8B7355";
    
    // Gerakkan gunung
    m.x -= 0.5;
    
    // Hapus jika keluar layar
    if (m.x < -100) {
      mountains.splice(index, 1);
    }
  });
}

function drawPalmTrees() {
  palmTrees.forEach((tree, index) => {
    let treeX = tree.x;
    let treeY = canvas.height * 0.6;
    
    // Batang pohon kelapa (coklat)
    ctx.fillStyle = "#8B4513";
    ctx.fillRect(treeX, treeY - 30, 4, 30);
    
    // Daun kelapa (hijau)
    ctx.fillStyle = "#228B22";
    // Daun kiri
    ctx.fillRect(treeX - 8, treeY - 32, 10, 4);
    ctx.fillRect(treeX - 10, treeY - 28, 8, 3);
    // Daun kanan
    ctx.fillRect(treeX + 2, treeY - 32, 10, 4);
    ctx.fillRect(treeX + 6, treeY - 28, 8, 3);
    // Daun tengah
    ctx.fillRect(treeX - 2, treeY - 35, 8, 5);
    
    // Kelapa
    ctx.fillStyle = "#8B4513";
    ctx.fillRect(treeX, treeY - 26, 3, 3);
    ctx.fillRect(treeX + 2, treeY - 24, 3, 3);
    
    // Gerakkan pohon
    tree.x -= tree.speed;
    
    // Reset jika keluar layar
    if (tree.x < -20) {
      tree.x = canvas.width + Math.random() * 100;
    }
  });
}

function drawBeachPeople() {
  beachPeople.forEach((item, index) => {
    let x = item.x;
    let y = canvas.height * 0.65;
    
    if (item.type === 'umbrella') {
      // Payung pantai
      ctx.fillStyle = "#FF6347";
      ctx.fillRect(x, y - 15, 12, 2);
      ctx.fillRect(x + 1, y - 17, 10, 2);
      ctx.fillRect(x + 2, y - 19, 8, 2);
      
      // Tiang payung
      ctx.fillStyle = "#8B4513";
      ctx.fillRect(x + 5, y - 15, 2, 15);
    } else {
      // Orang berjemur
      // Handuk
      ctx.fillStyle = "#FF69B4";
      ctx.fillRect(x, y, 12, 3);
      
      // Badan (kulit)
      ctx.fillStyle = "#FFDAB9";
      ctx.fillRect(x + 3, y - 4, 6, 4);
      
      // Kepala
      ctx.fillRect(x + 4, y - 7, 4, 3);
      
      // Tangan
      ctx.fillRect(x + 1, y - 3, 2, 2);
      ctx.fillRect(x + 9, y - 3, 2, 2);
    }
    
    // Gerakkan
    item.x -= item.speed;
    
    // Reset jika keluar layar
    if (item.x < -20) {
      item.x = canvas.width + Math.random() * 150;
      item.type = Math.random() > 0.5 ? 'person' : 'umbrella';
    }
  });
}

function drawBeachKids() {
  let x = beachKids.x;
  let y = canvas.height * 0.67;
  
  // SpongeBob (kuning kotak)
  ctx.fillStyle = "#FFFF00";
  ctx.fillRect(x, y - 8, 6, 8);
  
  // Mata SpongeBob
  ctx.fillStyle = "#FFFFFF";
  ctx.fillRect(x + 1, y - 6, 2, 2);
  ctx.fillRect(x + 3, y - 6, 2, 2);
  ctx.fillStyle = "#000000";
  ctx.fillRect(x + 2, y - 5, 1, 1);
  ctx.fillRect(x + 4, y - 5, 1, 1);
  
  // Celana SpongeBob
  ctx.fillStyle = "#8B4513";
  ctx.fillRect(x, y - 3, 6, 3);
  
  // Patrick (pink bintang)
  ctx.fillStyle = "#FF69B4";
  ctx.fillRect(x + 10, y - 6, 8, 6);
  ctx.fillRect(x + 12, y - 8, 4, 2);
  ctx.fillRect(x + 9, y - 4, 2, 2);
  ctx.fillRect(x + 17, y - 4, 2, 2);
  
  // Anak 1
  ctx.fillStyle = "#87CEEB";
  ctx.fillRect(x + 22, y - 7, 5, 7);
  ctx.fillStyle = "#FFDAB9";
  ctx.fillRect(x + 23, y - 9, 3, 2);
  
  // Anak 2
  ctx.fillStyle = "#FFB6C1";
  ctx.fillRect(x + 30, y - 7, 5, 7);
  ctx.fillStyle = "#FFDAB9";
  ctx.fillRect(x + 31, y - 9, 3, 2);
  
  // Bola pantai (animasi naik turun)
  if (beachKids.ballUp) {
    beachKids.ballY -= 0.5;
    if (beachKids.ballY < -15) beachKids.ballUp = false;
  } else {
    beachKids.ballY += 0.5;
    if (beachKids.ballY > -5) beachKids.ballUp = true;
  }
  
  ctx.fillStyle = "#FF0000";
  ctx.fillRect(x + 18, y - 12 + beachKids.ballY, 4, 4);
  ctx.fillStyle = "#FFFFFF";
  ctx.fillRect(x + 19, y - 11 + beachKids.ballY, 2, 2);
  
  // Gerakkan grup
  beachKids.x -= beachKids.speed;
  
  // Reset jika keluar layar
  if (beachKids.x < -40) {
    beachKids.x = canvas.width + 50;
  }
}

function drawShops() {
  shops.forEach((shop, index) => {
    let x = shop.x;
    let y = canvas.height * 0.48;
    
    // Bangunan ruko
    ctx.fillStyle = shop.color;
    ctx.fillRect(x, y, 50, 40);
    
    // Atap
    ctx.fillStyle = "#8B4513";
    ctx.fillRect(x - 2, y - 5, 54, 5);
    
    // Pintu
    ctx.fillStyle = "#654321";
    ctx.fillRect(x + 18, y + 20, 14, 20);
    
    // Jendela
    ctx.fillStyle = "#87CEEB";
    ctx.fillRect(x + 5, y + 8, 10, 8);
    ctx.fillRect(x + 35, y + 8, 10, 8);
    
    // Papan nama toko
    ctx.fillStyle = "#FFFFFF";
    ctx.fillRect(x + 10, y + 25, 30, 8);
    
    // Gerakkan toko
    shop.x -= shop.speed;
    
    // Reset jika keluar layar
    if (shop.x < -60) {
      shop.x = canvas.width + Math.random() * 100;
    }
  });
}

function drawCars() {
  cars.forEach((car, index) => {
    let x = car.x;
    let y = canvas.height * 0.565;
    
    // Badan mobil
    ctx.fillStyle = car.color;
    ctx.fillRect(x, y, 20, 8);
    
    // Atap mobil
    ctx.fillRect(x + 5, y - 4, 10, 4);
    
    // Roda
    ctx.fillStyle = "#000000";
    ctx.fillRect(x + 2, y + 8, 4, 2);
    ctx.fillRect(x + 14, y + 8, 4, 2);
    
    // Kaca depan
    ctx.fillStyle = "#87CEEB";
    ctx.fillRect(x + 13, y - 3, 2, 3);
    
    // Lampu
    ctx.fillStyle = "#FFFF00";
    ctx.fillRect(x + 19, y + 2, 1, 2);
    
    // Gerakkan mobil
    car.x -= car.speed;
    
    // Reset jika keluar layar
    if (car.x < -30) {
      car.x = canvas.width + Math.random() * 200;
      car.speed = Math.random() * 1 + 1.5;
    }
  });
}

function drawStreetVendors() {
  streetVendors.forEach((vendor, index) => {
    let x = vendor.x;
    let y = canvas.height * 0.63;
    
    if (vendor.type === 'food') {
      // Gerobak makanan
      ctx.fillStyle = "#FF6347";
      ctx.fillRect(x, y - 10, 15, 10);
      
      // Atap gerobak
      ctx.fillStyle = "#FFD700";
      ctx.fillRect(x - 2, y - 15, 19, 5);
      
      // Roda
      ctx.fillStyle = "#000000";
      ctx.fillRect(x + 2, y, 3, 3);
      ctx.fillRect(x + 10, y, 3, 3);
      
      // Pedagang
      ctx.fillStyle = "#FFDAB9";
      ctx.fillRect(x + 16, y - 8, 4, 8);
      ctx.fillRect(x + 17, y - 11, 2, 3);
      
    } else if (vendor.type === 'drink') {
      // Gerobak minuman
      ctx.fillStyle = "#4ECDC4";
      ctx.fillRect(x, y - 10, 15, 10);
      
      // Payung
      ctx.fillStyle = "#FF69B4";
      ctx.fillRect(x + 3, y - 18, 9, 2);
      ctx.fillRect(x + 4, y - 20, 7, 2);
      
      // Tiang payung
      ctx.fillStyle = "#8B4513";
      ctx.fillRect(x + 7, y - 18, 1, 8);
      
      // Roda
      ctx.fillStyle = "#000000";
      ctx.fillRect(x + 2, y, 3, 3);
      ctx.fillRect(x + 10, y, 3, 3);
      
      // Pedagang
      ctx.fillStyle = "#FFDAB9";
      ctx.fillRect(x + 16, y - 8, 4, 8);
      ctx.fillRect(x + 17, y - 11, 2, 3);
      
    } else {
      // Penjual kelapa
      ctx.fillStyle = "#8B4513";
      ctx.fillRect(x, y - 5, 12, 5);
      
      // Kelapa
      ctx.fillStyle = "#654321";
      ctx.fillRect(x + 2, y - 8, 3, 3);
      ctx.fillRect(x + 6, y - 8, 3, 3);
      
      // Pedagang
      ctx.fillStyle = "#FFDAB9";
      ctx.fillRect(x + 13, y - 8, 4, 8);
      ctx.fillRect(x + 14, y - 11, 2, 3);
    }
    
    // Gerakkan pedagang
    vendor.x -= vendor.speed;
    
    // Reset jika keluar layar
    if (vendor.x < -25) {
      vendor.x = canvas.width + Math.random() * 150;
    }
  });
}

function drawBird() {
  // Badan ayam jago (coklat kemerahan)
  ctx.fillStyle = "#D2691E";
  ctx.fillRect(bird.x, bird.y + 5, bird.size, bird.size - 5);
  
  // Kepala ayam (coklat lebih terang)
  ctx.fillStyle = "#CD853F";
  ctx.fillRect(bird.x + 5, bird.y, 12, 10);
  
  // Jengger merah
  ctx.fillStyle = "#FF0000";
  ctx.fillRect(bird.x + 8, bird.y - 3, 3, 5);
  ctx.fillRect(bird.x + 11, bird.y - 2, 3, 4);
  
  // Paruh kuning
  ctx.fillStyle = "#FFD700";
  ctx.fillRect(bird.x + 17, bird.y + 4, 4, 3);
  
  // Mata hitam
  ctx.fillStyle = "#000000";
  ctx.fillRect(bird.x + 13, bird.y + 3, 2, 2);
  
  // Sayap (coklat gelap)
  ctx.fillStyle = "#8B4513";
  ctx.fillRect(bird.x + 3, bird.y + 8, 10, 6);
  
  // Ekor (bulu-bulu)
  ctx.fillStyle = "#654321";
  ctx.fillRect(bird.x - 3, bird.y + 10, 5, 3);
  ctx.fillRect(bird.x - 2, bird.y + 7, 4, 3);
}

function drawPipes() {
  pipes.forEach(p => {
    // Lava panas - base merah gelap
    ctx.fillStyle = "#8B0000";
    ctx.fillRect(p.x, 0, 50, p.top);
    ctx.fillRect(p.x, p.bottom, 50, canvas.height);
    
    // Lava oranye terang (efek panas)
    ctx.fillStyle = "#FF4500";
    for (let i = 0; i < 10; i++) {
      let lavaX = p.x + (i * 7 + lavaOffset) % 50;
      let lavaYTop = (i * 19 + lavaOffset) % p.top;
      ctx.fillRect(lavaX, lavaYTop, 4, 6);
      
      let lavaYBottom = p.bottom + (i * 23 + lavaOffset) % (canvas.height - p.bottom);
      ctx.fillRect(lavaX, lavaYBottom, 4, 6);
    }
    
    // Lava kuning (titik panas)
    ctx.fillStyle = "#FFD700";
    for (let i = 0; i < 8; i++) {
      let hotX = p.x + (i * 11 + lavaOffset * 2) % 48;
      let hotYTop = (i * 17 + lavaOffset * 2) % p.top;
      ctx.fillRect(hotX, hotYTop, 2, 3);
      
      let hotYBottom = p.bottom + (i * 13 + lavaOffset * 2) % (canvas.height - p.bottom);
      ctx.fillRect(hotX, hotYBottom, 2, 3);
    }
    
    // Highlight merah terang (efek menyala)
    ctx.fillStyle = "#FF6347";
    ctx.fillRect(p.x + 2, 0, 3, p.top);
    ctx.fillRect(p.x + 2, p.bottom, 3, canvas.height);
    
    // Shadow hitam kemerahan
    ctx.fillStyle = "#4B0000";
    ctx.fillRect(p.x + 47, 0, 3, p.top);
    ctx.fillRect(p.x + 47, p.bottom, 3, canvas.height);
    
    // Efek asap/uap panas
    ctx.fillStyle = "rgba(255, 69, 0, 0.3)";
    for (let i = 0; i < 5; i++) {
      let smokeX = p.x + (i * 10) % 50;
      let smokeYTop = (i * 15 - lavaOffset * 3) % p.top;
      ctx.fillRect(smokeX, smokeYTop, 8, 12);
    }
  });
  
  // Update animasi lava
  lavaOffset += 0.5;
}

function updatePipes() {
  // 🔥 pipa tidak nempel
  if (pipes.length === 0 || pipes[pipes.length - 1].x < canvas.width - 200) {
    let gap = 140;
    let top = Math.random() * 200 + 50;

    pipes.push({
      x: canvas.width,
      top: top,
      bottom: top + gap,
      passed: false,
      moveDirection: 1, // untuk gerakan naik turun
      originalTop: top
    });
  }

  pipes.forEach(p => {
    p.x -= speed;
    
    // 🔥 Halangan naik turun mulai score 50
    if (score >= 50) {
      p.top += p.moveDirection * 0.5;
      p.bottom += p.moveDirection * 0.5;
      
      // Balik arah jika mencapai batas
      if (p.top < 30 || p.top > 250) {
        p.moveDirection *= -1;
      }
    }

    // collision
    if (
      bird.x < p.x + 50 &&
      bird.x + bird.size > p.x &&
      (bird.y < p.top || bird.y + bird.size > p.bottom)
    ) {
      gameOver = true;
    }

    // score
    if (!p.passed && p.x + 50 < bird.x) {
      score++;
      p.passed = true;

      // 🔥 speed naik tiap 10 point
      if (score % 10 === 0) {
        speed += 0.5;
      }
    }
  });

  pipes = pipes.filter(p => p.x > -50);
}

function updateBird() {
  bird.velocity += gravity;
  bird.y += bird.velocity;

  if (bird.y > canvas.height || bird.y < 0) {
    gameOver = true;
  }
}

function drawScore() {
  ctx.fillStyle = "black";
  ctx.font = "20px Arial";
  ctx.fillText("Score: " + score, 10, 30);
}

function loop() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Gambar background dulu
  drawBackground();

  if (!gameOver) {
    updateBird();
    updatePipes();
  }

  drawPipes();
  drawBird();
  drawScore();

  if (gameOver) {
    ctx.fillStyle = "red";
    ctx.font = "30px Arial";
    ctx.fillText("Game Over", 110, 250);
  }

  requestAnimationFrame(loop);
}

// Kontrol keyboard (SPASI)
document.addEventListener("keydown", e => {
  if (e.code === "Space") {
    bird.velocity = -8;

    if (gameOver) {
      // reset game
      bird.y = 200;
      bird.velocity = 0;
      pipes = [];
      score = 0;
      speed = 2; // reset speed
      gameOver = false;
    }
  }
});

// Kontrol touchscreen untuk HP
canvas.addEventListener("touchstart", e => {
  e.preventDefault(); // mencegah scroll
  
  bird.velocity = -8;

  if (gameOver) {
    // reset game
    bird.y = 200;
    bird.velocity = 0;
    pipes = [];
    score = 0;
    speed = 2; // reset speed
    gameOver = false;
  }
});

// Kontrol mouse click (bonus)
canvas.addEventListener("click", e => {
  bird.velocity = -8;

  if (gameOver) {
    // reset game
    bird.y = 200;
    bird.velocity = 0;
    pipes = [];
    score = 0;
    speed = 2; // reset speed
    gameOver = false;
  }
});

loop();
</script>
