<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Focus Dashboard</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <h1>Focus Dashboard</h1>
    <p id="tanggal-waktu" aria-live="polite"></p>
    <p id="sapaan" aria-live="polite"></p>
  </header>

  <main>
    <section aria-labelledby="judul-pengaturan">
      <h2 id="judul-pengaturan">Pengaturan</h2>
      <label for="nama-pengguna">Nama Anda</label>
      <input id="nama-pengguna" type="text" placeholder="Contoh: Agung" maxlength="40">
      <button id="simpan-nama" type="button">Simpan Nama</button>

      <label class="switch" for="mode-toggle">
        <input id="mode-toggle" type="checkbox">
        <span>Mode Gelap</span>
      </label>
    </section>

    <section aria-labelledby="judul-timer">
      <h2 id="judul-timer">Focus Timer</h2>
      <label for="durasi-menit">Durasi (menit)</label>
      <input id="durasi-menit" type="number" min="1" max="120" value="25">
      <p id="tampilan-timer" aria-live="polite">25:00</p>
      <menu>
        <li><button id="mulai-timer" type="button">Mulai</button></li>
        <li><button id="henti-timer" type="button">Henti</button></li>
        <li><button id="reset-timer" type="button">Reset</button></li>
      </menu>
    </section>

    <section aria-labelledby="judul-todo">
      <h2 id="judul-todo">To-Do List</h2>
      <label for="input-tugas">Tambah Tugas</label>
      <input id="input-tugas" type="text" placeholder="Tulis tugas...">
      <button id="tambah-tugas" type="button">Tambah</button>

      <label for="urutkan-tugas">Urutkan</label>
      <select id="urutkan-tugas">
        <option value="baru">Terbaru</option>
        <option value="lama">Terlama</option>
        <option value="az">A-Z</option>
        <option value="selesai">Status Selesai</option>
      </select>

      <ul id="daftar-tugas"></ul>
    </section>

    <section aria-labelledby="judul-link">
      <h2 id="judul-link">Quick Links</h2>
      <label for="nama-link">Nama Link</label>
      <input id="nama-link" type="text" placeholder="Contoh: YouTube">
      <label for="url-link">URL</label>
      <input id="url-link" type="url" placeholder="https://...">
      <button id="tambah-link" type="button">Simpan Link</button>
      <nav id="daftar-link" aria-label="Daftar quick links"></nav>
    </section>
  </main>

  <footer>
    <small>Semua data tersimpan di Local Storage browser Anda.</small>
  </footer>

  <script src="js/app.js"></script>
</body>
</html>
